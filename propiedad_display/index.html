<!DOCTYPE html>
<html lang="en">
<head>

    <style>
        .titulo {
            color: red;
            font-size: 100px;
            text-align: center;
        }

        .menu
        {
            display: inline;
            color: white;
            background-color: rgb(0, 0, 0);
            width: 1000px;
            height: 1000px;
        }

        .menu_block
        {
            display: block;
            color: rgb(196, 14, 14);
            background-color: rgb(42, 128, 168);
            width: 400px;
            height: 200px;
            border: 1px solid black;
        }   

    </style>
</head>
<body>
    <h1 class="titulo">elementos inline</h1>
    <div class="menu">inicio</div>
    <div class="menu">productos</div>
    <div class="menu">servicios</div>
    <div class="menu">contacto</div>
    <hr />
    <h1>elementos block</h1>
    <div class="menu_block">inicio</div>
    <div class="menu_block">productos</div>
    <div class="menu_block">servicios</div>
    <div class="menu_block">contacto</div>

</body>
</html>
